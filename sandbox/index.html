<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Form + Live Results</title>

    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <style>
      :root{
        /* Form sizing */
        --form-initial-min: 640px;
        --form-initial-max: 900px;
        --form-after-submit: 220px;

        /* Use the original working chart base size */
        --chart-base-w: 600;
        --chart-base-h: 377;

        /* Extra height for legend underneath */
        --chart-legend-h: 120;
      }

      html, body {
        margin: 0;
        padding: 0;
        background: transparent;
        font-family: Arial, sans-serif;
      }

      .container {
        width: 100%;
        margin: 0 auto;
        padding: 8px;
        box-sizing: border-box;
      }

      .block {
        margin-bottom: 12px;
      }

      .block:last-child {
        margin-bottom: 0;
      }

      iframe {
        width: 100%;
        border: 0;
        display: block;
        background: transparent;
      }

      #formFrame {
        height: clamp(var(--form-initial-min), 88vh, var(--form-initial-max));
        transition: height 240ms ease;
      }

      #results .chart-outer {
        width: 100%;
        margin: 0 auto;
      }

      #chartContainer {
        width: 100%;
        overflow: hidden;
      }

      #chartScaler {
        width: calc(var(--chart-base-w) * 1px);
        height: calc((var(--chart-base-h) + var(--chart-legend-h)) * 1px);
        transform-origin: 0 0;
      }

      #chartScaler iframe {
        width: 100%;
        height: 100%;
      }

      @media (max-width: 480px) {
        .container {
          padding: 6px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">

      <div class="block">
        <iframe
          id="formFrame"
          title="Quick pulse form"
          src="https://docs.google.com/forms/d/e/1FAIpQLSdNpePe9Zl28HAcyaKRFUhJycyeGO9wTwZ3o5yIZLZeTd_JQA/viewform?embedded=true">
        </iframe>
      </div>

      <div class="block" id="results">
        <div class="chart-outer">
          <div id="chartContainer">
            <div id="chartScaler">
              <iframe
                id="chartFrame"
                title="Live results chart"
                width="600"
                height="497"
                scrolling="no"
                src="https://docs.google.com/spreadsheets/d/e/2PACX-1vS2QjprbNBzX0v1bb5x2g07exNBdXcULnZi3UhujzoRvhUVuyNGU4bOqkl1jtSDYu_e18WSQi3Gm9-L/pubchart?oid=1318458492&amp;format=interactive">
              </iframe>
            </div>
          </div>
        </div>
      </div>

    </div>

    <script>
      (function () {
        var form = document.getElementById('formFrame');
        var results = document.getElementById('results');
        var loadCount = 0;
        if (!form || !results) return;

        function refreshChartSoon() {
          var chart = document.getElementById('chartFrame');
          if (!chart) return;
          var base = chart.src.split('&v=')[0];
          chart.src = base + "&v=" + Date.now();
        }

        function scrollToResults() {
          var y = results.getBoundingClientRect().top + window.pageYOffset - 4;
          window.scrollTo({ top: y, behavior: 'smooth' });
        }

        form.addEventListener('load', function () {
          loadCount += 1;

          if (loadCount > 1) {
            form.style.height = 'var(--form-after-submit)';

            var done = false;
            function onEnd(e) {
              if (done) return;
              if (e.propertyName !== 'height') return;
              done = true;
              form.removeEventListener('transitionend', onEnd);
              scrollToResults();
              setTimeout(refreshChartSoon, 450);
            }

            form.addEventListener('transitionend', onEnd, { once: true });

            setTimeout(function () {
              if (!done) {
                scrollToResults();
                refreshChartSoon();
              }
            }, 350);
          }
        }, { passive: true });
      })();

      (function () {
        var outer = document.querySelector('.chart-outer');
        var container = document.getElementById('chartContainer');
        var scaler = document.getElementById('chartScaler');
        if (!outer || !container || !scaler) return;

        var BASE_W = 600;
        var BASE_H = 497; /* 377 + 120 legend */

        function resize() {
          var cw = outer.clientWidth;
          var scale = cw / BASE_W;
          scaler.style.transform = 'scale(' + scale + ')';
          container.style.height = (BASE_H * scale) + 'px';
        }

        window.addEventListener('load', resize);
        window.addEventListener('resize', function () { requestAnimationFrame(resize); });
        window.addEventListener('orientationchange', function () { setTimeout(resize, 150); });
      })();
    </script>
  </body>
</html>
